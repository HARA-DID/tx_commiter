run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - noctx
    - exhaustive
    - godot

linters-settings:
  exhaustive:
    default-signifies-exhaustive: true
  goimports:
    local-prefixes: github.com/HARA-DID/did_queueing_engine

issues:
  exclude-rules:
    # Test files can use dot imports and unexported fields freely.
    - path: _test\.go
      linters:
        - unparam
        - unused
